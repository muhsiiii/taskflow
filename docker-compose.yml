services:


  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8026:8025"   # changed from 8025 to 8026
      - "1025:1025"
    networks: [taskflow]

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: taskflow
      PMA_PASSWORD: taskflow
    networks: [taskflow]
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/var/www/html
    depends_on: [mysql, redis]
    networks: [taskflow]
    environment:
      - DB_HOST=mysql
      - REDIS_HOST=redis

  nginx:
    image: nginx:alpine
    ports:
      - "8090:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - .:/var/www/html
    depends_on: [app]
    networks: [taskflow]

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: taskflow
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: taskflow
      MYSQL_PASSWORD: taskflow
    volumes:
      - mysql_data:/var/lib/mysql
    networks: [taskflow]

  redis:
    image: redis:7-alpine
    networks: [taskflow]

networks:
  taskflow: {}

volumes:
  mysql_data: {}